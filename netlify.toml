[build]
  command = "npm ci --include=dev && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["pg", "pg-native"]

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200